<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Arrow Function</h2>
        <p>This Example Shows An Arrow Function With A Parameter</p>
        <p id="result"></p>
        <script>
            const myFunction = (a, b) => a + b;
            document.getElementById("result").innerHTML = myFunction(4,6);
        </script>
    </body>
</html>
