<!DOCTYPE html>
<html>
    <body>
        <p>Click The Button To Evaluate/Execute Javascript codes/Expressions</p>
        <button onclick="myfunction()">Try It</button>
        <p id="result"></p>
        <script>
            function myfunction() {
            var x = 10;
            var y = 20;

            var a = eval("x + y"); "<br>"
            var b = eval("2 * 2");"<br>"
            var c = eval("y - x"); "<br>"

            var res = a+b+c; //concatenates the string
                document.getElementById("result").innerHTML = "Result: " + res;
        }
        </script>
    </body>
</html>
