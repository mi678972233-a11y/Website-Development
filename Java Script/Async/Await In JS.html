<!DOCTYPE html>
<html>
    <body>
        <h2>Await in JavaScript</h2>
        <p id="result"></p>
        <script>
            async function add(a,b) {   
               let response = await a+b
                    setTimeout(function() {
                    display(response);  
                });
               function display(some) {
                document.getElementById("result").innerHTML = some;
            }
            }   
            add(5, 20);
        </script>
    </body>
</html>
